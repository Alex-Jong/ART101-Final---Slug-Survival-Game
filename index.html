<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Slug Survival Game</title>
    <link href="SlugSurvival.css" rel="stylesheet" type="text/css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="SlugSurvival.js" defer></script>
</head>

<body>
    
    <!--Beginning Page when starting the webpage-->
    <p id="thought">Maybe click on the Tv...</p>
    <div class="IntroPage">
        <button id="TvScreen"><img src="Tv.png"></button>
        <div><p id="answer"></p></div>
        <div class="CoverScreen">
            <img src="Introduction.png">
            <button id="continue">Continue</button>
        </div>
    </div>

    
    <!--This is the main content of the game, the choise part of it-->
    <div class="MidPage">
        <button id="LeftImg"><img src="MidSection1Left.png"></button>
        <button id="RightImg"><img src="MidSection1Right.png"></button>
    </div>

    <div class="lake">
        <button id="LakeLeftImg"><img src="lakeSignLeft.png"></button>
        <button id="LakeRightImg"><img src="lakeSignRight.png"></button>
    </div>

    <div class="forest">
        <button id="ForestLeftImg"><img src="ForestLeftImg.png"></button>
        <button id="ForestRightImg"><img src="ForestRightImg.png"></button>
    </div>

    <div class="cat">
        <div id="catTitle"><h1>Cat's Cradle Ending</h1></div>
        <img src="cat-tink.png">
        <div id="catAnswer"></div>
        <button id="catBack">Start Over?</button>
    </div>

</body>

</html>
